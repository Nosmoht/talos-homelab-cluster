# namespaces-psa.yaml — TENANT namespace declarations only
#
# OWNERSHIP CONTRACT (Architecture C, post-incident 2026-05-18):
# This file is consumed by the top-level `root` Application
# (kubernetes/overlays/homelab/infrastructure/kustomization.yaml).
#
# Only TENANT namespaces appear here — namespaces this cluster's
# consumer overlay owns end-to-end, for which talos-platform-base ships
# no vendor namespace.yaml. Labels (PSA, capability consume.*) declared
# here are the sole source of truth for these namespaces.
#
# PLATFORM namespaces (those with a vendor namespace.yaml in
# vendor/base/kubernetes/base/infrastructure/<component>/namespace.yaml)
# are NOT in this file. Each is owned by its per-component Application,
# which sources vendor namespace.yaml via _rendered/manifests.yaml.
# Adding such a namespace here would create the double-tracking conflict
# documented in talos-platform-base ADR
# "Namespace Ownership in the Rendered Manifests Pattern".
#
# Exception: the `argocd` namespace remains here as a transitional
# entry until the argocd Application is migrated to the Rendered
# Manifests Pattern. The argocd App currently does not consume vendor
# namespace.yaml via its tracked source, so transferring tracking-id
# to it would cause it to prune the namespace.

# ---- TENANT namespaces ------------------------------------------------------

