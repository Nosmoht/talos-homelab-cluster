# namespaces-psa.yaml — namespace bootstrap + PSA label declaration
#
# OWNERSHIP CONTRACT:
# - This file is consumed by the top-level `root` Application
#   (kubernetes/overlays/homelab/infrastructure/kustomization.yaml).
# - Two distinct ownership models for the namespaces below:
#
#   (1) STAND-ALONE namespaces (the first 13 entries below).
#       The platform-base ships NO vendor namespace.yaml for these.
#       Labels (PSA, capability consume.*) declared here are the
#       sole source of truth.
#
#   (2) VENDOR CO-OWNED namespaces (the last 6 entries below).
#       The platform-base v0.3.0+ ships a vendor namespace.yaml in
#       kubernetes/base/infrastructure/<component>/namespace.yaml
#       that carries PSA + capability labels.
#       Per-component consumer Applications consume that vendor file
#       via their _rendered/ output and apply the labels via SSA.
#       The entries here are STUBS — name only, no labels — so the
#       root Application sees the namespace in its source tree and
#       does NOT mark it for prune. Labels come from the vendor copy.
#
# PRUNE-SAFETY ANNOTATION (`argocd.argoproj.io/sync-options: Prune=false`):
# Applied to every Namespace below. Reason: on 2026-05-18 a previous
# attempt to shrink this file removed 6 vendor-co-owned entries.
# The root Application saw the resources disappear from its source
# and pruned them — including Namespace `argocd` itself, which
# cascade-deleted all ArgoCD Applications. The Prune=false annotation
# is the forward-fix: even if a namespace is later removed from this
# file, the live resource is preserved. Manual NS cleanup remains
# possible via kubectl.
#
# See: incident notes 2026-05-18, talos-platform-base#38, this-repo#36.

# ---- (1) STAND-ALONE namespaces ---------------------------------------------

apiVersion: v1
kind: Namespace
metadata:
  name: default
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
  labels:
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/managed-by: argocd
    platform.io/network-interface-version: v1
    platform.io/network-profile: restricted
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/enforce-version: latest
    pod-security.kubernetes.io/audit: restricted
    pod-security.kubernetes.io/audit-version: latest
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/warn-version: latest
---
