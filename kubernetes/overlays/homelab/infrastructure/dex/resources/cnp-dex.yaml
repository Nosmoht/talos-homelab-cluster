apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: dex
  namespace: dex
  labels:
    app.kubernetes.io/name: dex
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: dex
      app.kubernetes.io/instance: dex
  ingress:
    # Direct local LAN access plus SNATed LB forwarding from cluster PodCIDR
    - fromCIDRSet:
        - cidr: 192.168.2.0/24
        - cidr: 10.244.0.0/16
      toPorts:
        - ports:
            - port: "5556"
              protocol: TCP
    # Cilium may classify cross-node LB forwarding as world on backend nodes
    - fromEntities:
        - world
      toPorts:
        - ports:
            - port: "5556"
              protocol: TCP
    # Gateway proxy traffic (Cilium external Envoy proxy uses reserved:ingress identity)
    - fromEntities:
        - ingress
      toPorts:
        - ports:
            - port: "5556"
              protocol: TCP
    # ArgoCD server -> Dex OIDC
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: argocd
      toPorts:
        - ports:
            - port: "5556"
              protocol: TCP
    # Monitoring namespace -> Dex OIDC (Grafana token exchange, OAuth2 proxies)
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
      toPorts:
        - ports:
            - port: "5556"
              protocol: TCP
  egress:
    # DNS
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
          rules:
            dns:
              - matchPattern: "*"
