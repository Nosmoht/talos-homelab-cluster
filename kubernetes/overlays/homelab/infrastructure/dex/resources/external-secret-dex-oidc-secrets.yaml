apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: dex-oidc-secrets
  namespace: dex
  labels:
    app.kubernetes.io/name: dex-oidc-secrets
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: external-secret
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: SecretStore
  target:
    name: dex-oidc-secrets
    creationPolicy: Owner
    template:
      type: Opaque
  dataFrom:
    # 7 OIDC client secrets used by dex + downstream consumers (argocd,
    # argo-workflows, grafana, prometheus, alertmanager) and dex's own
    # google-client-{id,secret}. See docs/secrets-vault-paths.md.
    - extract:
        key: clusters/homelab/dex/dex-oidc-secrets
