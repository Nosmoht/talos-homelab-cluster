apiVersion: rabbitmq.com/v1beta1
kind: Vhost
metadata:
  name: smoke-vhost
  namespace: rabbitmq-system
  labels:
    app.kubernetes.io/name: rabbitmq-smoke
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: topology-probe
    app.kubernetes.io/part-of: rabbitmq
    app.kubernetes.io/managed-by: argocd
spec:
  name: smoke
  rabbitmqClusterReference:
    name: rabbitmq-smoke
---
apiVersion: rabbitmq.com/v1beta1
kind: User
metadata:
  name: smoke-user
  namespace: rabbitmq-system
  labels:
    app.kubernetes.io/name: rabbitmq-smoke
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: topology-probe
    app.kubernetes.io/part-of: rabbitmq
    app.kubernetes.io/managed-by: argocd
spec:
  tags:
    - monitoring
  rabbitmqClusterReference:
    name: rabbitmq-smoke
---
apiVersion: rabbitmq.com/v1beta1
kind: Permission
metadata:
  name: smoke-user-permission
  namespace: rabbitmq-system
  labels:
    app.kubernetes.io/name: rabbitmq-smoke
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: topology-probe
    app.kubernetes.io/part-of: rabbitmq
    app.kubernetes.io/managed-by: argocd
spec:
  vhost: smoke
  userReference:
    name: smoke-user
  permissions:
    write: ".*"
    configure: ".*"
    read: ".*"
  rabbitmqClusterReference:
    name: rabbitmq-smoke
---
apiVersion: rabbitmq.com/v1beta1
kind: Queue
metadata:
  name: smoke-queue
  namespace: rabbitmq-system
  labels:
    app.kubernetes.io/name: rabbitmq-smoke
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: topology-probe
    app.kubernetes.io/part-of: rabbitmq
    app.kubernetes.io/managed-by: argocd
spec:
  name: smoke-queue
  vhost: smoke
  type: quorum
  durable: true
  rabbitmqClusterReference:
    name: rabbitmq-smoke
