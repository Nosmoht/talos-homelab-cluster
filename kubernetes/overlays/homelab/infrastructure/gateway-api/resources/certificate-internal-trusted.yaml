apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: internal-trusted-wildcard-tls
  namespace: default
  labels:
    app.kubernetes.io/name: gateway
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: certificate
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  secretName: internal-trusted-wildcard-tls
  privateKey:
    algorithm: ECDSA
    size: 256
    rotationPolicy: Always
  duration: 2160h
  renewBefore: 720h
  issuerRef:
    name: homelab
    kind: ClusterIssuer
  dnsNames:
    - "*.lan.homelab.ntbc.io"
    - "lan.homelab.ntbc.io"
