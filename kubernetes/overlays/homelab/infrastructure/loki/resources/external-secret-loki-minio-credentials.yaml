# References the SecretStore `vault-kv` in monitoring namespace,
# which is declared by kube-prometheus-stack/resources/secret-store.yaml.
# loki and kube-prometheus-stack co-tenant in the monitoring namespace
# and share that SecretStore.
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: loki-minio-credentials
  namespace: monitoring
  labels:
    app.kubernetes.io/name: loki-minio-credentials
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: external-secret
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: SecretStore
  target:
    name: loki-minio-credentials
    creationPolicy: Owner
    template:
      type: Opaque
  dataFrom:
    # 2 keys: LOKI_S3_ACCESS_KEY_ID, LOKI_S3_SECRET_ACCESS_KEY.
    - extract:
        key: clusters/homelab/monitoring/loki-minio-credentials
