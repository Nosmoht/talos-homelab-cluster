apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: minio
  namespace: minio
  labels:
    app.kubernetes.io/name: minio
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  endpointSelector:
    matchLabels:
      v1.min.io/tenant: minio
  ingress:
    # S3 API from PNI s3-object consumers
    - fromEndpoints:
        - matchLabels:
            k8s:io.cilium.k8s.namespace.labels.platform.io/consume.s3-object: "true"
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
    # Console access from cluster-internal clients
    - fromEntities:
        - cluster
      toPorts:
        - ports:
            - port: "9443"
              protocol: TCP
    # Inter-pod erasure coding traffic
    - fromEndpoints:
        - matchLabels:
            v1.min.io/tenant: minio
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
    # Prometheus metrics scraping (cross-namespace)
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
            app.kubernetes.io/name: prometheus
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
    # Health probes from kubelet
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
    # Operator lifecycle management
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: minio-operator
            app.kubernetes.io/name: operator
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
            - port: "9443"
              protocol: TCP
  egress:
    # Inter-pod erasure coding traffic
    - toEndpoints:
        - matchLabels:
            v1.min.io/tenant: minio
      toPorts:
        - ports:
            - port: "9000"
              protocol: TCP
    # Kubernetes API for auto-TLS CSR
    - toCIDRSet:
        - cidr: 10.96.0.1/32
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
    # DNS
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
