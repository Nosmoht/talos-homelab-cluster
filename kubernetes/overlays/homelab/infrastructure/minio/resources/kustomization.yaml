apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

generators:
  - ksops-generator.yaml

resources:
  - cnp-minio-operator.yaml
  - cnp-minio.yaml
  - servicemonitor-minio.yaml
  - secret-store.yaml  # Phase A.2 — ESO SecretStore for kv/clusters/homelab/minio/*
  - external-secrets-sa.yaml  # Phase A.3 — SA used by SecretStore
  - external-secret-myminio-env-configuration.yaml  # Phase A.3

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: dashboard-minio
    namespace: monitoring
    files:
      - dashboards/minio.json
    options:
      labels:
        grafana_dashboard: "1"
