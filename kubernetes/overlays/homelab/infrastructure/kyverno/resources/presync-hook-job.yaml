# Wait for kyverno-admission-controller deployment to be Available before
# applying ClusterPolicy CRs (validated by Kyverno's own webhook).
apiVersion: batch/v1
kind: Job
metadata:
  name: presync-wait-webhook-kyverno
  namespace: kyverno
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
  labels:
    app.kubernetes.io/name: presync-wait-webhook-kyverno
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: hook-job
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: presync-wait-webhook-kyverno
        app.kubernetes.io/instance: homelab
        app.kubernetes.io/component: hook-job
        app.kubernetes.io/part-of: homelab
    spec:
      serviceAccountName: presync-hook-kyverno
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: wait
          image: bitnami/kubectl:1.31
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          command:
            - kubectl
            - wait
            - --for=condition=Available
            - deployment/kyverno-admission-controller
            - --namespace=kyverno
            - --timeout=180s
