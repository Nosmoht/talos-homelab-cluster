# Grafana admin credentials Secret. Required because Phase B.3 set
# `grafana.admin.existingSecret: grafana-admin-credentials` in
# kube-prometheus-stack values.yaml — without this Secret, the
# Grafana pod won't start.
#
# Unlike the other ExternalSecrets in this directory there is no
# pre-existing SOPS source for this Secret; the chart used to
# auto-generate a random admin password at helm-template time, which
# was non-deterministic and broke the verify-rendered drift gate.
# Phase A's seed runbook generates a fresh password directly into
# Vault (see docs/secrets-vault-paths.md).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: grafana-admin-credentials
  namespace: monitoring
  labels:
    app.kubernetes.io/name: grafana-admin-credentials
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: external-secret
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: SecretStore
  target:
    name: grafana-admin-credentials
    creationPolicy: Owner
    template:
      type: Opaque
  dataFrom:
    # Vault entry holds: admin-user, admin-password.
    - extract:
        key: clusters/homelab/monitoring/grafana-admin-credentials
