apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: alertmanager
  namespace: monitoring
  labels:
    app.kubernetes.io/name: kube-prometheus-stack
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: alertmanager
  ingress:
    # Prometheus -> Alertmanager
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: prometheus
      toPorts:
        - ports:
            - port: "9093"
              protocol: TCP
    # OAuth2 proxy -> Alertmanager
    - fromEndpoints:
        - matchLabels:
            app: alertmanager-oauth2-proxy
      toPorts:
        - ports:
            - port: "9093"
              protocol: TCP
    # Grafana -> Alertmanager
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: grafana
      toPorts:
        - ports:
            - port: "9093"
              protocol: TCP
    # Prometheus -> Alertmanager config-reloader metrics
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: prometheus
      toPorts:
        - ports:
            - port: "8080"
              protocol: TCP
    # Alertmanager mesh (self) — memberlist gossip uses TCP + UDP
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: alertmanager
      toPorts:
        - ports:
            - port: "9094"
              protocol: TCP
            - port: "9094"
              protocol: UDP
    # Loki ruler -> Alertmanager
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: loki
      toPorts:
        - ports:
            - port: "9093"
              protocol: TCP
  egress:
    # Alertmanager mesh — memberlist gossip uses TCP + UDP
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/name: alertmanager
      toPorts:
        - ports:
            - port: "9094"
              protocol: TCP
            - port: "9094"
              protocol: UDP
    # DNS
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
