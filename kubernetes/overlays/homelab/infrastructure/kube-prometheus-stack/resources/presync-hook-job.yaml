# Wait for kube-prometheus-stack-operator (prometheus-operator) deployment
# Available before applying PrometheusRule + ServiceMonitor CRs.
apiVersion: batch/v1
kind: Job
metadata:
  name: presync-wait-webhook-kube-prometheus-stack
  namespace: monitoring
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,BeforeHookCreation
  labels:
    app.kubernetes.io/name: presync-wait-webhook-kube-prometheus-stack
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: hook-job
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: presync-wait-webhook-kube-prometheus-stack
        app.kubernetes.io/instance: homelab
        app.kubernetes.io/component: hook-job
        app.kubernetes.io/part-of: homelab
    spec:
      serviceAccountName: presync-hook-kube-prometheus-stack
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: wait
          image: bitnamilegacy/kubectl:1.31
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          command:
            - kubectl
            - wait
            - --for=condition=Available
            - deployment/kube-prometheus-stack-operator
            - --namespace=monitoring
            - --timeout=180s
