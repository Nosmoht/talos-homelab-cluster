# Per-namespace SecretStore for ESO in monitoring namespace.
# Shared by kube-prometheus-stack AND loki (both deploy into monitoring).
# This SecretStore lives here (not in loki/) because kube-prometheus-stack
# is the dominant tenant of the namespace; either location works since
# the SecretStore is namespace-scoped and any ExternalSecret in the
# namespace can reference it by name.
# See cert-manager/resources/secret-store.yaml for design rationale.
apiVersion: external-secrets.io/v1beta1
kind: SecretStore
metadata:
  name: vault-kv
  namespace: monitoring
  labels:
    app.kubernetes.io/name: vault-kv
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: secret-store
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  provider:
    vault:
      server: https://vault.vault.svc:8200
      caProvider:
        type: ConfigMap
        name: vault-ca
        key: ca.crt
        namespace: monitoring
      path: kv
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: eso-monitoring
          serviceAccountRef:
            name: external-secrets
