# ServiceAccount used by ESO in monitoring namespace. Shared by all
# ExternalSecrets in monitoring (kube-prometheus-stack + loki). The
# Vault role `eso-monitoring` binds this single SA across both
# component overlays.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets
  namespace: monitoring
  labels:
    app.kubernetes.io/name: external-secrets
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: secret-store-auth
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
