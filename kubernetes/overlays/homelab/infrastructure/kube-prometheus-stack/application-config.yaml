# Config App — wave 2. ServiceMonitors + PrometheusRule + HTTPRoutes + CNPs +
# ESO + KSOPS Secrets + Grafana dashboards. PrometheusRule + ServiceMonitor
# are validated by prometheus-operator's admission webhook → PreSync gate.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kube-prometheus-stack-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/name: kube-prometheus-stack-config
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: config
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  project: infrastructure
  source:
    repoURL: https://github.com/Nosmoht/talos-homelab-cluster.git
    targetRevision: main
    path: kubernetes/overlays/homelab/infrastructure/kube-prometheus-stack/resources
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
      - CreateNamespace=false
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
