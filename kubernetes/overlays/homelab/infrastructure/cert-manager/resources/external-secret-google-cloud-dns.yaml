apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: google-cloud-dns
  namespace: cert-manager
  labels:
    app.kubernetes.io/name: google-cloud-dns
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: external-secret
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: vault-kv
    kind: SecretStore
  target:
    name: google-cloud-dns
    creationPolicy: Owner
    template:
      type: Opaque
  dataFrom:
    - extract:
        # Vault entry holds plain-text JSON under `service-account-key.json`.
        # ESO base64-encodes when writing to Secret.data — matches what
        # cert-manager DNS-01 challenge expects.
        key: clusters/homelab/cert-manager/google-cloud-dns
