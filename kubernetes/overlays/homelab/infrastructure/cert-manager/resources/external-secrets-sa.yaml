# ServiceAccount used by ESO to authenticate to Vault from this
# namespace. The SecretStore (secret-store.yaml) references this SA;
# Vault's KubernetesAuthEngineRole `eso-cert-manager` (declared by
# the VCO CR in vault-config-operator/resources/eso-role-cert-manager.yaml)
# binds it via `bound_service_account_names: [external-secrets]` and
# `bound_service_account_namespaces: [cert-manager]`.
#
# No special permissions — ESO controller (in external-secrets ns) has
# cluster-wide tokenrequests permission and uses it to mint a JWT for
# this SA, which Vault then verifies via TokenReview.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets
  namespace: cert-manager
  labels:
    app.kubernetes.io/name: external-secrets
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: secret-store-auth
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
