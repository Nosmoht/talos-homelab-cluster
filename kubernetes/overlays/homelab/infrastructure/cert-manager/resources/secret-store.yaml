# Per-namespace SecretStore for ESO. Authenticates to Vault using the
# `external-secrets` ServiceAccount in this namespace, bound to the
# `eso-cert-manager` Vault role + policy (declared by VCO CRs in
# kubernetes/overlays/homelab/infrastructure/vault-config-operator/
# resources/eso-{policy,role}-cert-manager.yaml).
#
# Per-namespace (not ClusterSecretStore) is required because the live
# ESO controller has --enable-cluster-store-reconciler=false (verified
# in cluster, see verify-vault-live.md). Per-namespace also gives a
# tighter Vault-side authorization boundary: the SA in this namespace
# can only read kv/clusters/homelab/cert-manager/* paths.
apiVersion: external-secrets.io/v1
kind: SecretStore
metadata:
  name: vault-kv
  namespace: cert-manager
  labels:
    app.kubernetes.io/name: vault-kv
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: secret-store
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  provider:
    vault:
      server: https://vault.vault.svc:8200
      caProvider:
        type: ConfigMap
        name: vault-ca
        key: ca.crt
        namespace: cert-manager
      path: kv
      version: v2
      auth:
        kubernetes:
          mountPath: kubernetes
          role: eso-cert-manager
          serviceAccountRef:
            name: external-secrets
