# PreSync hook: blocks cert-manager-config sync until the cert-manager
# admission webhook deployment is Available. Without this, ClusterIssuer/
# Certificate CRs may apply before the validating webhook reaches a ready
# endpoint and fail with "no endpoints available for service".
# See docs/rendered-manifests-application-patterns.md.
apiVersion: batch/v1
kind: Job
metadata:
  name: presync-wait-webhook-cert-manager
  namespace: cert-manager
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded,HookFailed
  labels:
    app.kubernetes.io/name: presync-wait-webhook-cert-manager
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: hook-job
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: presync-wait-webhook-cert-manager
        app.kubernetes.io/instance: homelab
        app.kubernetes.io/component: hook-job
        app.kubernetes.io/part-of: homelab
    spec:
      serviceAccountName: presync-hook-cert-manager
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: wait
          image: bitnami/kubectl:1.31
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          command:
            - kubectl
            - wait
            - --for=condition=Available
            - deployment/cert-manager-webhook
            - --namespace=cert-manager
            - --timeout=120s
