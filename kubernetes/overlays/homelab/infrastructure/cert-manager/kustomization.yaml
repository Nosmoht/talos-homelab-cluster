# Top-level overlay entry — consumed by App-of-Apps. Emits the three
# ArgoCD Applications that own the cert-manager component under the
# rendered-manifests pattern:
#   - application-crds.yaml    (wave -5, _rendered/crds.yaml only)
#   - application.yaml         (wave  0, _rendered/manifests.yaml)
#   - application-config.yaml  (wave  2, resources/ — CRs + PreSync hook)
#
# Workload manifests come from vendor/base/ and live in _rendered/.
# See docs/rendered-manifests-application-patterns.md.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - application-crds.yaml
  - application.yaml
  - application-config.yaml
