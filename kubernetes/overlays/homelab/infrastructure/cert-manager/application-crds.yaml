# CRDs App — wave -5. Reads _rendered/crds.yaml only. Prune=false so
# Application deletion does not orphan CRs. See
# docs/rendered-manifests-application-patterns.md.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager-crds
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-5"
  labels:
    app.kubernetes.io/name: cert-manager-crds
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: crds
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  project: infrastructure
  source:
    repoURL: https://github.com/Nosmoht/talos-homelab-cluster.git
    targetRevision: main
    path: kubernetes/overlays/homelab/infrastructure/cert-manager/_rendered
    directory:
      include: 'crds.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: false
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - Replace=false
      - CreateNamespace=false
      - RespectIgnoreDifferences=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  ignoreDifferences:
    # cainjector mutates conversion.webhook.clientConfig.caBundle at runtime.
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jqPathExpressions:
        - '.spec.conversion.webhook.clientConfig.caBundle'
