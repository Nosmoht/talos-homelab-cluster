apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: linstor-controller
  namespace: piraeus-datastore
  labels:
    app.kubernetes.io/name: piraeus-datastore
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/component: linstor-controller
  ingress:
    # Internal LINSTOR clients (satellites, CSI, affinity, storage-pool, operator)
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/component: linstor-satellite
        - matchLabels:
            app.kubernetes.io/component: linstor-csi-controller
        - matchLabels:
            app.kubernetes.io/component: linstor-affinity-controller
        - matchLabels:
            app.kubernetes.io/component: linstor-storage-pool-autovg
        - matchLabels:
            app.kubernetes.io/component: piraeus-operator
      toPorts:
        - ports:
            - port: "3371"
              protocol: TCP
            - port: "3370"
              protocol: TCP
    # Kubelet health probes + linstor-csi-node (hostNetwork)
    # hostNetwork traffic can arrive as host (local node) or remote-node (other nodes).
    - fromEntities:
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "3370"
              protocol: TCP
            - port: "3371"
              protocol: TCP
    # Prometheus metrics scraping (cross-namespace)
    - fromEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: monitoring
            app.kubernetes.io/name: prometheus
      toPorts:
        - ports:
            - port: "3370"
              protocol: TCP
  egress:
    # Satellite communication (pod endpoints, pre-hostNetwork fallback)
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/component: linstor-satellite
      toPorts:
        - ports:
            - port: "3367"
              protocol: TCP
    # Satellite communication (hostNetwork: true — satellites present as remote-node,
    # kube-apiserver (CP nodes), or host (local node) entities in Cilium)
    - toEntities:
        - remote-node
        - kube-apiserver
        - host
      toPorts:
        - ports:
            - port: "3367"
              protocol: TCP
    # Kubernetes API
    - toCIDRSet:
        - cidr: 10.96.0.1/32
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
    # DNS
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
