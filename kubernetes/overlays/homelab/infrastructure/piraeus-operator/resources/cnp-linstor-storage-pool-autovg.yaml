apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: linstor-storage-pool-autovg
  namespace: piraeus-datastore
  labels:
    app.kubernetes.io/name: piraeus-datastore
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/component: linstor-storage-pool-autovg
  egress:
    # LINSTOR controller API (storage pool reconciliation)
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/component: linstor-controller
      toPorts:
        - ports:
            - port: "3371"
              protocol: TCP
            - port: "3370"
              protocol: TCP
    # Kubernetes API
    - toCIDRSet:
        - cidr: 10.96.0.1/32
      toPorts:
        - ports:
            - port: "443"
              protocol: TCP
    - toEntities:
        - kube-apiserver
      toPorts:
        - ports:
            - port: "6443"
              protocol: TCP
    # DNS
    - toEndpoints:
        - matchLabels:
            k8s:io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: UDP
            - port: "53"
              protocol: TCP
