apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: piraeus-operator
  namespace: piraeus-datastore
  labels:
    app.kubernetes.io/name: piraeus-datastore
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/component: piraeus-operator
  ingress:
    # Webhook calls from kube-apiserver
    - fromEntities:
        - kube-apiserver
        - host
        - remote-node
      toPorts:
        - ports:
            - port: "9443"
              protocol: TCP
    # Kubelet health probes (healthz:8081, readyz:8081)
    - fromEntities:
        - host
      toPorts:
        - ports:
            - port: "8081"
              protocol: TCP
  egress:
    # LINSTOR controller API (management operations)
    - toEndpoints:
        - matchLabels:
            app.kubernetes.io/component: linstor-controller
      toPorts:
        - ports:
            - port: "3371"
              protocol: TCP
            - port: "3370"
              protocol: TCP
