apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: messaging-topology-operator
  namespace: rabbitmq-system
  labels:
    app.kubernetes.io/name: rabbitmq-messaging-topology-operator
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: messaging-topology-operator
      control-plane: controller-manager
  ingress:
    # kubelet liveness/readiness probes on health port 8081
    - fromEntities:
        - host
      toPorts:
        - ports:
            - port: "8081"
              protocol: TCP
    # Prometheus metrics scraping on 8443 (HTTPS)
    - fromEndpoints:
        - matchLabels:
            app.kubernetes.io/name: prometheus
      toPorts:
        - ports:
            - port: "8443"
              protocol: TCP
