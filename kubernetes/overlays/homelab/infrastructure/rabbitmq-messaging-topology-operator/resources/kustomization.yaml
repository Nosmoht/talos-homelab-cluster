apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - messaging-topology-operator-with-certmanager.yaml
  - cnp-messaging-topology-operator.yaml

patches:
  # Drop duplicate Namespace: rabbitmq-system (provided by cluster-operator bundle)
  # to avoid ArgoCD SharedResourceWarning.
  - target:
      kind: Namespace
      name: rabbitmq-system
    patch: |
      $patch: delete
      apiVersion: v1
      kind: Namespace
      metadata:
        name: rabbitmq-system
  # Tag MTO pod with PNI capability-consumer labels so cluster-wide CCNPs
  # (controlplane-egress, monitoring-scrape, internet-egress, rabbitmq-operator-dataplane)
  # permit its traffic without a dedicated operator-egress CNP.
  - target:
      kind: Deployment
      name: messaging-topology-operator
      namespace: rabbitmq-system
    patch: |
      - op: add
        path: /spec/template/metadata/labels/platform.io~1capability-consumer.controlplane-egress
        value: "true"
      - op: add
        path: /spec/template/metadata/labels/platform.io~1capability-consumer.monitoring-scrape
        value: "true"
      - op: add
        path: /spec/template/metadata/labels/platform.io~1capability-consumer.internet-egress
        value: "true"
      - op: add
        path: /spec/template/metadata/labels/platform.io~1capability-consumer.rabbitmq-operator-dataplane
        value: "true"
      - op: add
        path: /spec/template/metadata/labels/platform.io~1capability-provider.admission-webhook
        value: "true"
