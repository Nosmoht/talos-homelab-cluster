apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: vault-ui
  namespace: vault
  labels:
    app.kubernetes.io/name: vault
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: network-policy
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/name: vault
      vault_cr: vault
  ingress:
    # Gateway proxy traffic (Cilium external Envoy proxy uses reserved:ingress identity)
    - fromEntities:
        - ingress
      toPorts:
        - ports:
            - port: "8200"
              protocol: TCP
