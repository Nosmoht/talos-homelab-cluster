# H2 tuning: 4 workers match Pi 4B's 4 Cortex-A72 cores. High fd+conn
# ceilings leave headroom for slow-TLS-handshake floods; conservative
# timeouts keep slot exhaustion short; per-IP connection limit blunts
# trivial socket-exhaustion.
worker_processes auto;
worker_rlimit_nofile 65536;

events {
  worker_connections 16384;
  multi_accept on;
  use epoll;
}

stream {
  # Per-source-IP concurrent connection cap. 10 MB zone tracks ~160k
  # source IPv6 states (80k IPv4). Caps trivial socket-flood from a
  # single WAN client without blocking legitimate NAT'd traffic.
  limit_conn_zone $binary_remote_addr zone=perip:10m;

  # Gateway Envoy listens on hostNetwork port 443 on the gateway-labeled
  # worker nodes (node-role.kubernetes.io/gateway="" set on node-04/05/06).
  # Pi proxies L4 TCP — no TLS termination on the Pi. Envoy terminates,
  # matches SNI against the external-https listener, and routes via
  # HTTPRoute. Passive health checks fail the Pi over to remaining
  # gateway workers transparently.
  upstream gateway_https {
    server 192.168.2.64:443 max_fails=2 fail_timeout=10s;
    server 192.168.2.65:443 max_fails=2 fail_timeout=10s;
    server 192.168.2.66:443 max_fails=2 fail_timeout=10s;
  }

  # SNI allowlist. Order matters — nginx map entries evaluate top-to-bottom.
  # The specific .lan. deny MUST precede the general .homelab.ntbc.io allow
  # so public ingress does NOT forward *.lan.homelab.ntbc.io SNIs to Envoy
  # (Envoy's internal-trusted-https listener would otherwise match them
  # and expose internal UIs via WAN). Default-deny closes every unknown
  # SNI at L4 (client sees exit 35 / connection reset).
  map $ssl_preread_server_name $public_upstream {
    ~*\.lan\.homelab\.ntbc\.io$   "";
    ~*\.homelab\.ntbc\.io$         gateway_https;
    default                         "";
  }

  server {
    # hostNetwork — binds on Pi's real NIC (burnt-in SoC MAC).
    # reuseport: per-worker accept queue, eliminates thundering herd.
    # fastopen=256: enable TFO with 256-slot cookie cache.
    # deferred: TCP_DEFER_ACCEPT — kernel holds ACCEPT until data arrives,
    #   mitigates empty-SYN-handshake exhaustion.
    # backlog=8192: SYN-queue depth under flood.
    listen 443 reuseport fastopen=256 deferred backlog=8192;
    ssl_preread on;

    # Cap any single remote IP to 32 concurrent L4 connections.
    limit_conn perip 32;

    # proxy_connect_timeout default 60s is unusable under SYN flood —
    # 3s is aggressive but safe because upstream workers are on the LAN.
    proxy_connect_timeout 3s;
    # proxy_timeout default 10m — slash hard so stale half-open
    # connections free up worker_connections slots quickly.
    proxy_timeout 60s;
    # Enable TCP keepalive on the socket toward the upstream.
    proxy_socket_keepalive on;

    proxy_pass $public_upstream;
  }
}
