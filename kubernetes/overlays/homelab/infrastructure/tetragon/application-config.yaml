# Config App — wave 2. CiliumNetworkPolicy + TracingPolicies + Grafana dashboard.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: tetragon-config
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "2"
  labels:
    app.kubernetes.io/name: tetragon-config
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: config
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  project: infrastructure
  source:
    repoURL: https://github.com/Nosmoht/talos-homelab-cluster.git
    targetRevision: main
    path: kubernetes/overlays/homelab/infrastructure/tetragon/resources
  destination:
    server: https://kubernetes.default.svc
    namespace: tetragon
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
      - RespectIgnoreDifferences=true
      - CreateNamespace=false
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
