resources:
  - ../../../../../../vendor/base/kubernetes/base/infrastructure/vault-config-operator/_rendered/manifests.yaml
  - ../../../../../../vendor/base/kubernetes/base/infrastructure/vault-config-operator/_rendered/crds.yaml
