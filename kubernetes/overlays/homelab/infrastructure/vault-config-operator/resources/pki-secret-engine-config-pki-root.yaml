apiVersion: redhatcop.redhat.io/v1alpha1
kind: PKISecretEngineConfig
metadata:
  name: pki-root-config
  namespace: vault
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: pki-root-config
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: vault-pki-config
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  authentication:
    path: kubernetes
    role: vco-pki-admin
    serviceAccount:
      name: controller-manager
  path: pki_root
  commonName: homelab.local Root CA
  TTL: 87600h
  type: root
  privateKeyType: internal
  keyType: ec
  keyBits: 256
  issuingCertificates:
    - https://vault.vault.svc.cluster.local:8200/v1/pki_root/ca
  CRLDistributionPoints:
    - https://vault.vault.svc.cluster.local:8200/v1/pki_root/crl
