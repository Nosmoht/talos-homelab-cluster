apiVersion: batch/v1
kind: Job
metadata:
  name: vault-config-operator-bootstrap
  namespace: vault
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation,HookSucceeded
    argocd.argoproj.io/sync-wave: "-1"
  labels:
    app.kubernetes.io/name: vault-config-operator-bootstrap
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: bootstrap
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vault-config-operator-bootstrap
        app.kubernetes.io/instance: homelab
        app.kubernetes.io/component: bootstrap
        app.kubernetes.io/part-of: homelab
        app.kubernetes.io/managed-by: argocd
    spec:
      restartPolicy: OnFailure
      serviceAccountName: vault
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: copy-vault-ca
          image: alpine/kubectl:1.35.0
          command:
            - /bin/sh
            - -ec
            - |
              kubectl -n cert-manager create secret generic vault-ca \
                --from-file=ca.crt=/vault/tls/ca.crt \
                --dry-run=client -o yaml | kubectl apply -f -
              kubectl -n vault create configmap vault-backend-ca \
                --from-file=ca.crt=/vault/tls/ca.crt \
                --dry-run=client -o yaml | kubectl apply -f -
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: vault-tls
              mountPath: /vault/tls
              readOnly: true
      containers:
        - name: bootstrap
          image: hashicorp/vault:1.21.2
          command:
            - /bin/sh
            - -ec
            - |
              export VAULT_ADDR="https://vault.vault.svc.cluster.local:8200"
              export VAULT_CACERT="/vault/tls/ca.crt"
              export VAULT_TOKEN="$(cat /vault/bootstrap/vault-root)"
              export KUBE_CA_PATH="/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"

              until vault status >/dev/null 2>&1; do
                sleep 5
              done

              if ! vault auth list -format=json | grep -q '"kubernetes/"'; then
                vault auth enable kubernetes
              fi

              vault write auth/kubernetes/config \
                kubernetes_host="https://kubernetes.default.svc:443" \
                kubernetes_ca_cert=@"${KUBE_CA_PATH}"

              cat >/tmp/vco-pki-admin-policy.hcl <<'POLICY'
              path "sys/mounts" {
                capabilities = ["read", "list"]
              }
              path "sys/mounts/pki_root" {
                capabilities = ["create", "read", "update", "delete", "list"]
              }
              path "sys/mounts/pki_root/*" {
                capabilities = ["create", "read", "update", "delete", "list"]
              }
              path "sys/mounts/pki_int" {
                capabilities = ["create", "read", "update", "delete", "list"]
              }
              path "sys/mounts/pki_int/*" {
                capabilities = ["create", "read", "update", "delete", "list"]
              }
              path "pki_root/*" {
                capabilities = ["create", "read", "update", "delete", "list"]
              }
              path "pki_int/*" {
                capabilities = ["create", "read", "update", "delete", "list"]
              }
              path "sys/policies/acl" {
                capabilities = ["read", "list"]
              }
              path "sys/policies/acl/*" {
                capabilities = ["create", "read", "update", "delete", "list"]
              }
              path "auth/kubernetes/config" {
                capabilities = ["create", "read", "update"]
              }
              path "auth/kubernetes/role/*" {
                capabilities = ["create", "read", "update", "delete", "list"]
              }
              POLICY

              vault policy write vco-pki-admin /tmp/vco-pki-admin-policy.hcl

              vault write auth/kubernetes/role/vco-pki-admin \
                bound_service_account_names="controller-manager" \
                bound_service_account_namespaces="vault" \
                policies="vco-pki-admin" \
                ttl="1h"
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: vault-bootstrap
              mountPath: /vault/bootstrap
              readOnly: true
            - name: vault-tls
              mountPath: /vault/tls
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: vault-bootstrap
          secret:
            secretName: vault-unseal-keys
            items:
              - key: vault-root
                path: vault-root
        - name: vault-tls
          secret:
            secretName: vault-tls
