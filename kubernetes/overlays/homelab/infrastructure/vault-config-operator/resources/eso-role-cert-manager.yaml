apiVersion: redhatcop.redhat.io/v1alpha1
kind: KubernetesAuthEngineRole
metadata:
  name: eso-cert-manager
  namespace: vault
  annotations:
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: eso-cert-manager
    app.kubernetes.io/instance: homelab
    app.kubernetes.io/component: vault-auth-role
    app.kubernetes.io/part-of: homelab
    app.kubernetes.io/managed-by: argocd
spec:
  authentication:
    path: kubernetes
    role: vco-pki-admin
    serviceAccount:
      name: controller-manager
  path: kubernetes
  policies:
    - eso-cert-manager
  targetServiceAccounts:
    - external-secrets
  targetNamespaces:
    targetNamespaces:
      - cert-manager
  # Match Talos default serviceAccountToken.expirationSeconds (3607s) so
  # the Vault session lifetime does not outlast the SA-JWT used to log
  # in. ESO refreshes both at the same cadence.
  tokenTTL: 3600
