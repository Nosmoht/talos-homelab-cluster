worker_processes 1;
events { worker_connections 512; }
stream {
  # Gateway Envoy listens on hostNetwork ports 80/443 on all gateway nodes.
  # Traffic must arrive via net1 (macvlan) as external LAN traffic to
  # bypass Cilium's eBPF identity-marking and the cilium.l7policy filter
  # (which causes 403 for pod-origin traffic via eth0).
  # Macvlan bridge mode blocks same-host traffic, so the local node's IP
  # will fail - nginx stream upstream automatically fails over to other nodes.
  # Since 2026-04-17 this proxy is LAN-only; WAN ingress lives on
  # node-pi-01 (pi-public-ingress, docs/adr-pi-sole-public-ingress.md).
  upstream gateway_http {
    server 192.168.2.64:80;
    server 192.168.2.65:80;
    server 192.168.2.66:80;
  }
  upstream gateway_https {
    server 192.168.2.64:443;
    server 192.168.2.65:443;
    server 192.168.2.66:443;
  }

  # Internal VIP (.70): defense-in-depth on the SNI - reject hostnames in
  # the public zone (*.homelab.ntbc.io) that are not in the .lan. subzone.
  # Guards against operator-error where the FritzBox port-forward is
  # accidentally re-pointed at the LAN VIP. The .lan. subzone is the
  # exception: it uses *.homelab.ntbc.io wildcard-shaped LE certificates
  # for internal services, so it must pass through.
  map $ssl_preread_server_name $internal_upstream {
    ~*\.lan\.homelab\.ntbc\.io$  gateway_https;
    ~*\.homelab\.ntbc\.io$        "";
    default                        gateway_https;
  }

  server {
    listen 192.168.2.70:80;
    proxy_pass gateway_http;
  }
  server {
    listen 192.168.2.70:443;
    ssl_preread on;
    proxy_pass $internal_upstream;
  }
}
