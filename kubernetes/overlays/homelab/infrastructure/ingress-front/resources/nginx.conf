worker_processes 1;
events { worker_connections 512; }
stream {
  # Gateway Envoy listens on hostNetwork ports 80/443 on all gateway nodes.
  # Traffic must arrive via net1/net2 (macvlan) as external LAN traffic to
  # bypass Cilium's eBPF identity-marking and the cilium.l7policy filter
  # (which causes 403 for pod-origin traffic via eth0).
  # Macvlan bridge mode blocks same-host traffic, so the local node's IP
  # will fail - nginx stream upstream automatically fails over to other nodes.
  upstream gateway_http {
    server 192.168.2.64:80;
    server 192.168.2.65:80;
    server 192.168.2.66:80;
  }
  upstream gateway_https {
    server 192.168.2.64:443;
    server 192.168.2.65:443;
    server 192.168.2.66:443;
  }

  # Public VIP (.99): only *.homelab.ntbc.io SNIs reach Envoy, with the
  # exception of *.lan.homelab.ntbc.io which is an internal-only subzone
  # (publicly-trusted LE cert, but no public A records and no route through
  # the public VIP). The more-specific .lan. rule must come first because
  # nginx map regex entries are evaluated top-to-bottom.
  map $ssl_preread_server_name $public_upstream {
    ~*\.lan\.homelab\.ntbc\.io$  "";
    ~*\.homelab\.ntbc\.io$        gateway_https;
    default                        "";
  }

  # Internal VIP (.70): defense-in-depth mirror image - reject SNIs claiming
  # to be public hostnames. Defends against operator-error where the router
  # port-forward is accidentally re-pointed at the internal VIP. The .lan.
  # subzone is the exception: it uses *.homelab.ntbc.io wildcard-shaped
  # certificates (LE-trusted) for internal services, so it must pass through.
  map $ssl_preread_server_name $internal_upstream {
    ~*\.lan\.homelab\.ntbc\.io$  gateway_https;
    ~*\.homelab\.ntbc\.io$        "";
    default                        gateway_https;
  }

  server {
    listen 192.168.2.70:80;
    proxy_pass gateway_http;
  }
  server {
    listen 192.168.2.70:443;
    ssl_preread on;
    proxy_pass $internal_upstream;
  }
  server {
    listen 192.168.2.99:443;
    ssl_preread on;
    proxy_pass $public_upstream;
  }
}
