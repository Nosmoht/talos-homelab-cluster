# Mechanically enforce parity between the kernel-param-auditor 3-layer baseline and
# talos/patches/common.yaml. Fires only when one of the two source files changes (or
# the workflow itself).
#
# Bypass for emergency hotfixes: add the literal token `[skip-baseline-check]` to the
# PR title. The job is skipped, not failed. Document the bypass in the PR body so
# follow-up reconciliation has an audit trail.
name: sysctl-baseline-check

on:
  pull_request:
    paths:
      - 'talos/patches/common.yaml'
      - '.claude/skills/kernel-param-auditor/references/role-baselines.md'
      - '.github/workflows/sysctl-baseline-check.yml'
      - '.github/workflows/scripts/sysctl-parity.sh'

jobs:
  parity:
    if: ${{ !contains(github.event.pull_request.title, '[skip-baseline-check]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        uses: mikefarah/yq@v4.45.1

      - name: Detect baseline-source-of-truth location
        id: detect
        run: |
          set -euo pipefail
          BL=.claude/skills/kernel-param-auditor/references/role-baselines.md
          # role-baselines.md moved upstream to providers/os-talos/skills/kernel-param-auditor/references/
          # in kube-agent-harness; this consumer no longer hosts it after the v0.3 migration. The parity
          # contract now lives upstream — provider plugin owns the three-layer baseline. Skip the
          # consumer-side parity check entirely when the file is absent.
          if [ -f "$BL" ]; then
            echo "baseline-present=true" >> "$GITHUB_OUTPUT"
          else
            echo "baseline-present=false" >> "$GITHUB_OUTPUT"
            echo "::notice::role-baselines.md not present on consumer (migrated upstream to kube-agent-harness-os-talos provider). Skipping consumer-side parity — upstream provider plugin is the single source of truth for the three-layer baseline."
          fi

      - name: Extract layer baselines from role-baselines.md
        if: steps.detect.outputs.baseline-present == 'true'
        run: |
          set -euo pipefail
          BL=.claude/skills/kernel-param-auditor/references/role-baselines.md
          for layer in 1 2 3; do
            awk "/^# layer${layer}-baseline-yaml-start$/,/^# layer${layer}-baseline-yaml-end$/" "$BL" \
              | sed '1d;$d' | yq e '.sysctls' - > "/tmp/layer${layer}.yaml"
            count=$(yq e 'keys | length' "/tmp/layer${layer}.yaml")
            echo "layer ${layer}: ${count} sysctls"
            [ "$count" -gt 0 ] || { echo "::error::layer-${layer} block missing or empty"; exit 1; }
          done

      - name: Normalize common.yaml sysctls (whitespace-collapsed tuples)
        if: steps.detect.outputs.baseline-present == 'true'
        run: |
          set -euo pipefail
          yq e '.machine.sysctls | with_entries(.value = {"expected": (.value | sub("[\t ]+"; " "))})' \
            talos/patches/common.yaml > /tmp/common.yaml
          count=$(yq e 'keys | length' /tmp/common.yaml)
          echo "common.yaml: ${count} sysctls"
          [ "$count" -gt 0 ] || { echo "::error::common.yaml has no sysctls"; exit 1; }

      - name: Parity check (4 fail conditions)
        if: steps.detect.outputs.baseline-present == 'true'
        run: bash .github/workflows/scripts/sysctl-parity.sh
